# Gold query set for RAG-LITE-LR retrieval evaluation.
#
# Each entry is a query phrased the way program/research staff at a
# non-profit might actually type it, plus a small set of known-relevant
# doc_ids drawn from data/processed/corpus.jsonl (an ~1,123-document corpus
# spanning education/social-policy (ERIC), and environment, research, and
# arts & culture topics from DOAJ, OpenAlex, Europe PMC, PLOS, and World
# Bank Documents & Reports). These ids were found by inspecting titles in
# the corpus, not selected via this pipeline's own retrieval output, to
# avoid biasing the qrels.
#
# Used by scripts/evaluate_retrieval.py to compute end-to-end
# Precision/Recall/NDCG@k and MRR.

