# Gold query set for RAG-LITE-LR retrieval evaluation.
#
# Each entry is a query phrased the way program/research staff at a
# non-profit might actually type it, plus a small set of known-relevant
# doc_ids drawn from data/processed/corpus.jsonl (a 400-document ERIC
# corpus covering 10 education/social-policy topics). These ids were found
# by inspecting titles in the corpus and were not selected via this
# pipeline's own retrieval output, to avoid biasing the qrels.
#
# Used by scripts/evaluate_retrieval.py to compute end-to-end
# Precision/Recall/NDCG@k and MRR.

- query: "What programs help improve early literacy outcomes for low-income preschoolers?"
  relevant_ids:
    - "eric:EJ1392919"  # Teacher-Implemented Shared-Reading Intervention to Promote Early Literacy Skills of Preschoolers
    - "eric:EJ796965"   # Applying a Response-to-Intervention Model for Early Literacy Development in Low-Income Children
    - "eric:EJ1402033"  # An Intervention Program Based on the Syllabic Method for Enhancing Early Literacy in Preschool
    - "eric:EJ1061401"  # Development of a Tier 3 Curriculum to Teach Early Literacy Skills

